<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTMPC — Go Terminal Music Player</title>
    <meta name="description" content="A modern web interface for the GTMPC music streaming server">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ============ AUTH SCREEN ============ -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="auth-brand">
                <div class="brand-icon">♫</div>
                <h1>GTMPC</h1>
                <p class="brand-subtitle">Go Terminal Music Player</p>
            </div>
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="register">Register</button>
                </div>
                <div id="auth-error" class="auth-error hidden"></div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form">
                    <div class="input-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <span>Sign In</span>
                    </button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form hidden">
                    <div class="input-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" placeholder="Choose a username" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="Create a password" required autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <label for="reg-role">Role</label>
                        <select id="reg-role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="register-btn">
                        <span>Create Account</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ============ MAIN APP SCREEN ============ -->
    <div id="app-screen" class="screen">
        <!-- Top Nav -->
        <header class="top-bar">
            <div class="top-bar-left">
                <span class="logo">♫ GTMPC</span>
            </div>
            <div class="top-bar-center">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
                    <input type="text" id="search-input" placeholder="Search tracks, artists, albums..." autocomplete="off">
                </div>
            </div>
            <div class="top-bar-right">
                <span id="user-display" class="user-badge"></span>
                <button id="logout-btn" class="btn btn-ghost" title="Logout">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" fill="none"/><polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" fill="none"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2"/></svg>
                </button>
            </div>
        </header>

        <!-- Library Content -->
        <main class="library-content">
            <div class="library-header">
                <h2 id="library-title">Your Library</h2>
                <span id="track-count" class="track-count"></span>
                <div style="flex:1"></div>
                <button id="upload-btn" class="btn btn-primary" style="padding:8px 16px; font-size:13px;">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path d="M21,15v4a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2V15" stroke="currentColor" stroke-width="2" fill="none"/><polyline points="17,8 12,3 7,8" stroke="currentColor" stroke-width="2" fill="none"/><line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="2"/></svg>
                    Upload Music
                </button>
                <input type="file" id="file-input" accept=".mp3,.wav,.flac" multiple style="display:none">
            </div>
            <div id="track-list" class="track-list">
                <!-- Tracks rendered here by JS -->
            </div>
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">🎵</div>
                <h3>No tracks found</h3>
                <p>Your music library is empty. Configure music directories on the server.</p>
            </div>
            <div id="loading-state" class="loading-state">
                <div class="spinner"></div>
                <p>Loading your library...</p>
            </div>
        </main>

        <!-- Bottom Player Bar -->
        <footer id="player-bar" class="player-bar hidden">
            <div class="player-track-info">
                <div class="player-art">♫</div>
                <div class="player-meta">
                    <div class="player-title" id="player-title">—</div>
                    <div class="player-artist" id="player-artist">—</div>
                </div>
            </div>
            <div class="player-controls">
                <button id="btn-prev" class="player-btn" title="Previous">
                    <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="19,20 9,12 19,4" fill="currentColor"/><line x1="5" y1="4" x2="5" y2="20" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button id="btn-play" class="player-btn player-btn-main" title="Play">
                    <svg id="icon-play" viewBox="0 0 24 24" width="28" height="28"><polygon points="6,4 20,12 6,20" fill="currentColor"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" width="28" height="28" class="hidden"><rect x="5" y="4" width="4" height="16" fill="currentColor"/><rect x="15" y="4" width="4" height="16" fill="currentColor"/></svg>
                </button>
                <button id="btn-next" class="player-btn" title="Next">
                    <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="5,4 15,12 5,20" fill="currentColor"/><line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2"/></svg>
                </button>
            </div>
            <div class="player-timeline">
                <span id="current-time" class="time-label">0:00</span>
                <input type="range" id="seek-bar" class="seek-bar" min="0" max="100" value="0" step="0.1">
                <span id="total-time" class="time-label">0:00</span>
            </div>
            <div class="player-volume">
                <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M19.07,4.93a10,10,0,0,1,0,14.14" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                <input type="range" id="volume-bar" class="volume-bar" min="0" max="100" value="80" step="1">
            </div>
        </footer>

        <!-- Hidden audio element -->
        <audio id="audio-element" preload="auto"></audio>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
